<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherApp - Home</title>
   <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
<link rel="stylesheet" href="/main.scss">

</head>
<body class="d-flex flex-column min-vh-100 bg-light">
   <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">MundoClima</a>
        </div>
      </nav>
    </header>
     <main class="container my-5">
      <h1 class="text-center mb-4">Estado del Clima</h1>
      <div class="row g-4" id="lista-ciudades"></div>

      <div class="col-12 col-md-6 col-lg-4">
        <div class="weather-card weather-card--hot p-3">
          <h5 class="weather-card__title">Santiago</h5>
          <p class="weather-card__temp">30°C</p>
          <span class="weather-card__status bg-info">Despejado</span>
          <a href="/detalle.html" class="btn btn-primary w-100 mt-3">ver detalle</a>
        </div>
      </div>



    </main>

    <footer class="bg-light py-4 mt-auto border-top">
      <div class="container text-center">
        <p>&copy; 2026 WeatherApp MVP - Proyecto M2</p>
      </div>
    </footer>
     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    
    <script src="js/main.js"></script>
  
</body>
</html>

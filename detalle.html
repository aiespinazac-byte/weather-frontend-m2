<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del clima</title>

    <link rel="stylesheet" href="css/main.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">MundoClima</a>
        </div>
      </nav>
    </header>
    <main class="container my-5">
      <div class="weather-details shadow-sm">
        <h1 id="nombre-ciudad" class="weather-details__city">Cargando...</h1>
        <p class="weather-details__temp" id="temp-detalle">--°C</p>
        <span class="weather-details__status" id="estado-detalle">--</span>
      </div>

    <section class="container px-0 mt-4">
     <div id ="estadisticas-semanales"></div> 
    </section>

    <section class="container mt-5 px-0">
      <h2 class="text-center mb-4 font-weight-bold"> Pronostico Semanal</h2>
      <div class="row g-3 justify-content-center" id="pronostico-lista">
      
      </div>
    </section>
    </main>
        
  
    <footer class="bg-light py-4 mt-auto border-top">
      <div class="container text-center">
        <p>&copy; 2026 WeatherApp MVP - Proyecto M2</p>
      </div>
    </footer>

    <script src="js/main.js"></script>

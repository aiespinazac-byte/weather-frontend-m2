<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Detalle del clima</title>
    <link href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<body class="d-flex flex-column min-vh-100 bg-light">
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">MundoClima</a>
      </div>
    </nav>
  </header>
  <main class="container my-5">
    <div class="text-center">

    </div>
 
    <div class="container mt-5 text-center">
     <h1 id="nombre-ciudad" class="display-3 fw-bold">Cargando...</h1>
     <a href="index.html" class="btn btn-secondary mt-3">volver al inicio</a>  
</div>

     <div class="card shadow-sm p-4 mt-4 mx-auto" style="max-width: 500px;">
            <div class="card-body text-center">
              <h5 class="card-title" id="nombre ciudad">Cargando...</h5>
              <p class="display-6" id="temp-detalle">--°C</p>
              <p class="badge bg-info text-dark" id="estado-detalle">--</p>
              <button
                class="btn btn-outline-primary w-100 mt-3 btn-detalle"
                data-ciudad="Santiago"

          </div>
      <section class="container mt-5">
         <h2 class="text-center mb-4">Pronóstico Semanal</h2>

                <div class="card-header bg-light fw-bold">Lunes</div>

                    <span class="fs-1">☀️</span> 
                    <p class="card-text mb-0">24°C</p>

                </div>
            </div>
                </div>

      </section>
